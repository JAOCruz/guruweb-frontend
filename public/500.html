<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Error del servidor — Gurú Soluciones</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #020617;
      color: #e2e8f0;
      font-family: system-ui, -apple-system, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 480px; }
    h1 {
      font-size: 6rem;
      font-weight: 900;
      background: linear-gradient(to right, #ef4444, #f97316);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 1rem;
    }
    h2 { font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #94a3b8; margin-bottom: 2rem; line-height: 1.6; }
    a {
      display: inline-block;
      background: #06b6d4;
      color: #020617;
      text-decoration: none;
      font-weight: 700;
      padding: 0.75rem 1.5rem;
      border-radius: 0.5rem;
      transition: opacity 0.2s;
    }
    a:hover { opacity: 0.9; }
  </style>
</head>
<body>
  <div class="container">
    <h1>500</h1>
    <h2>Error interno del servidor</h2>
    <p>Algo salió mal de nuestro lado. Estamos trabajando para solucionarlo. Por favor intenta de nuevo en unos minutos.</p>
    <a href="/">Volver al inicio</a>
  </div>
</body>
</html>
